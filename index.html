<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #faf8ef;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  user-select: none;
}

.header {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 12px;
}

h1 {
  font-size: 52px;
  color: #776e65;
  font-weight: 800;
}

.scores {
  display: flex;
  gap: 8px;
}

.score-box {
  background: #bbada0;
  color: #fff;
  padding: 6px 16px;
  border-radius: 6px;
  text-align: center;
  min-width: 72px;
}

.score-box .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  opacity: 0.7;
}

.score-box .value {
  font-size: 22px;
  font-weight: bold;
}

.controls {
  margin-bottom: 12px;
}

.controls button {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  background: #8f7a66;
  color: #f9f6f2;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}

.controls button:hover {
  background: #776e65;
}

.board {
  position: relative;
  width: 420px;
  height: 420px;
  background: #bbada0;
  border-radius: 8px;
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 10px;
  width: 100%;
  height: 100%;
}

.cell {
  background: rgba(238, 228, 218, 0.35);
  border-radius: 6px;
}

.tiles {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  bottom: 10px;
}

.tile {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  width: calc((100% - 30px) / 4);
  height: calc((100% - 30px) / 4);
  border-radius: 6px;
  font-weight: bold;
  transition: top 0.12s ease, left 0.12s ease;
  z-index: 1;
}

.tile.merged {
  animation: pop 0.2s ease;
  z-index: 2;
}

.tile.new {
  animation: appear 0.2s ease;
}

@keyframes appear {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.tile[data-value="2"]    { background: #eee4da; color: #776e65; font-size: 36px; }
.tile[data-value="4"]    { background: #ede0c8; color: #776e65; font-size: 36px; }
.tile[data-value="8"]    { background: #f2b179; color: #f9f6f2; font-size: 36px; }
.tile[data-value="16"]   { background: #f59563; color: #f9f6f2; font-size: 36px; }
.tile[data-value="32"]   { background: #f67c5f; color: #f9f6f2; font-size: 36px; }
.tile[data-value="64"]   { background: #f65e3b; color: #f9f6f2; font-size: 36px; }
.tile[data-value="128"]  { background: #edcf72; color: #f9f6f2; font-size: 30px; }
.tile[data-value="256"]  { background: #edcc61; color: #f9f6f2; font-size: 30px; }
.tile[data-value="512"]  { background: #edc850; color: #f9f6f2; font-size: 30px; }
.tile[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 24px; }
.tile[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 24px; }

.tile.super {
  background: #3c3a32;
  color: #f9f6f2;
  font-size: 20px;
}

.overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(238, 228, 218, 0.73);
  border-radius: 8px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.3s ease;
}

.overlay.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.overlay h2 {
  font-size: 40px;
  color: #776e65;
  margin-bottom: 16px;
}

.overlay button {
  padding: 12px 28px;
  font-size: 16px;
  font-weight: 600;
  background: #8f7a66;
  color: #f9f6f2;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.15s;
}

.overlay button:hover {
  background: #776e65;
}
</style>
</head>
<body>
<div class="header">
  <h1>2048</h1>
  <div class="scores">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>
</div>
<div class="controls">
  <button id="new-game-btn">New Game</button>
</div>
<div class="board" id="board">
  <div class="grid">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
  <div class="tiles" id="tiles"></div>
  <div class="overlay" id="game-over">
    <h2>Game Over!</h2>
    <button id="retry-btn">Try Again</button>
  </div>
</div>

<script>
(function () {
  var SIZE = 4;
  var grid, score, gameOver, tileId;

  var scoreEl = document.getElementById("score");
  var bestEl = document.getElementById("best");
  var tilesEl = document.getElementById("tiles");
  var overlayEl = document.getElementById("game-over");

  var best = parseInt(localStorage.getItem("2048_best"), 10) || 0;
  bestEl.textContent = best;

  function cellLeft(c) {
    return c * (100 / SIZE) + "%";
  }

  function cellTop(r) {
    return r * (100 / SIZE) + "%";
  }

  function init() {
    grid = [];
    score = 0;
    gameOver = false;
    tileId = 0;
    scoreEl.textContent = "0";
    overlayEl.classList.remove("active");
    tilesEl.innerHTML = "";
    for (var r = 0; r < SIZE; r++) {
      grid[r] = [];
      for (var c = 0; c < SIZE; c++) {
        grid[r][c] = null;
      }
    }
    spawnTile();
    spawnTile();
  }

  function emptyCells() {
    var empty = [];
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (!grid[r][c]) empty.push({ r: r, c: c });
      }
    }
    return empty;
  }

  function createTileEl(value, r, c, isNew) {
    var el = document.createElement("div");
    el.className = "tile" + (isNew ? " new" : "");
    el.setAttribute("data-value", value);
    if (value > 2048) el.classList.add("super");
    el.textContent = value;
    el.style.left = cellLeft(c);
    el.style.top = cellTop(r);
    tilesEl.appendChild(el);
    return el;
  }

  function spawnTile() {
    var empty = emptyCells();
    if (empty.length === 0) return;
    var pos = empty[Math.floor(Math.random() * empty.length)];
    var value = Math.random() < 0.9 ? 2 : 4;
    var el = createTileEl(value, pos.r, pos.c, true);
    grid[pos.r][pos.c] = { value: value, el: el };
  }

  function getTraversals(direction) {
    var rowOrder = [0, 1, 2, 3];
    var colOrder = [0, 1, 2, 3];
    if (direction === "down") rowOrder = [3, 2, 1, 0];
    if (direction === "right") colOrder = [3, 2, 1, 0];
    return { rows: rowOrder, cols: colOrder };
  }

  function getVector(direction) {
    var map = {
      up:    { dr: -1, dc: 0 },
      down:  { dr: 1,  dc: 0 },
      left:  { dr: 0,  dc: -1 },
      right: { dr: 0,  dc: 1 }
    };
    return map[direction];
  }

  function inBounds(r, c) {
    return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
  }

  function findFarthest(r, c, vec) {
    var prevR = r, prevC = c;
    do {
      prevR = r;
      prevC = c;
      r += vec.dr;
      c += vec.dc;
    } while (inBounds(r, c) && !grid[r][c]);
    return {
      farthest: { r: prevR, c: prevC },
      next: { r: r, c: c }
    };
  }

  function move(direction) {
    if (gameOver) return;

    var vec = getVector(direction);
    var traversals = getTraversals(direction);
    var moved = false;
    var mergedCells = [];

    for (var ri = 0; ri < SIZE; ri++) {
      for (var ci = 0; ci < SIZE; ci++) {
        var r = traversals.rows[ri];
        var c = traversals.cols[ci];
        var cell = grid[r][c];
        if (!cell) continue;

        var positions = findFarthest(r, c, vec);
        var nextR = positions.next.r;
        var nextC = positions.next.c;
        var target = inBounds(nextR, nextC) ? grid[nextR][nextC] : null;

        if (target && target.value === cell.value && mergedCells.indexOf(target) === -1) {
          var mergedValue = cell.value * 2;
          score += mergedValue;

          target.el.remove();
          cell.el.setAttribute("data-value", mergedValue);
          if (mergedValue > 2048) cell.el.classList.add("super");
          cell.el.textContent = mergedValue;
          cell.el.style.left = cellLeft(nextC);
          cell.el.style.top = cellTop(nextR);
          cell.el.classList.add("merged");

          cell.value = mergedValue;
          grid[nextR][nextC] = cell;
          grid[r][c] = null;
          mergedCells.push(cell);
          moved = true;
        } else {
          var destR = positions.farthest.r;
          var destC = positions.farthest.c;
          if (destR !== r || destC !== c) {
            cell.el.style.left = cellLeft(destC);
            cell.el.style.top = cellTop(destR);
            grid[destR][destC] = cell;
            grid[r][c] = null;
            moved = true;
          }
        }
      }
    }

    if (moved) {
      scoreEl.textContent = score;
      if (score > best) {
        best = score;
        bestEl.textContent = best;
        try { localStorage.setItem("2048_best", best); } catch (e) {}
      }

      setTimeout(function () {
        mergedCells.forEach(function (cell) {
          cell.el.classList.remove("merged");
        });
        spawnTile();

        if (isGameOver()) {
          gameOver = true;
          overlayEl.classList.add("active");
        }
      }, 130);
    }
  }

  function isGameOver() {
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (!grid[r][c]) return false;
        var val = grid[r][c].value;
        if (c + 1 < SIZE && grid[r][c + 1] && grid[r][c + 1].value === val) return false;
        if (r + 1 < SIZE && grid[r + 1][c] && grid[r + 1][c].value === val) return false;
      }
    }
    return true;
  }

  document.addEventListener("keydown", function (e) {
    var map = {
      ArrowLeft: "left",
      ArrowRight: "right",
      ArrowUp: "up",
      ArrowDown: "down"
    };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  document.getElementById("new-game-btn").addEventListener("click", init);
  document.getElementById("retry-btn").addEventListener("click", init);

  init();
})();
</script>
</body>
</html>
