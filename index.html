<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #faf8ef;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.header {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 16px;
}

h1 {
  font-size: 48px;
  color: #776e65;
}

.score-box {
  background: #bbada0;
  color: #fff;
  padding: 8px 16px;
  border-radius: 6px;
  text-align: center;
  min-width: 80px;
}

.score-box .label {
  font-size: 12px;
  text-transform: uppercase;
  opacity: 0.8;
}

.score-box .value {
  font-size: 24px;
  font-weight: bold;
}

.controls {
  margin-bottom: 16px;
}

.controls button {
  padding: 8px 16px;
  font-size: 14px;
  background: #8f7a66;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.controls button:hover {
  background: #776e65;
}

.board {
  position: relative;
  width: 420px;
  height: 420px;
  background: #bbada0;
  border-radius: 8px;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 10px;
}

.cell {
  background: rgba(238, 228, 218, 0.35);
  border-radius: 6px;
}

.tile {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 90px;
  height: 90px;
  border-radius: 6px;
  font-size: 36px;
  font-weight: bold;
  color: #776e65;
  background: #eee4da;
}

.tile[data-value="2"] { background: #eee4da; }
.tile[data-value="4"] { background: #ede0c8; }
.tile[data-value="8"] { background: #f2b179; color: #f9f6f2; }
.tile[data-value="16"] { background: #f59563; color: #f9f6f2; }
.tile[data-value="32"] { background: #f67c5f; color: #f9f6f2; }
.tile[data-value="64"] { background: #f65e3b; color: #f9f6f2; }
.tile[data-value="128"] { background: #edcf72; color: #f9f6f2; font-size: 30px; }
.tile[data-value="256"] { background: #edcc61; color: #f9f6f2; font-size: 30px; }
.tile[data-value="512"] { background: #edc850; color: #f9f6f2; font-size: 30px; }
.tile[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 24px; }
.tile[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 24px; }

.overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(238, 228, 218, 0.73);
  border-radius: 8px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.overlay.active {
  display: flex;
}

.overlay h2 {
  font-size: 36px;
  color: #776e65;
  margin-bottom: 16px;
}

.overlay button {
  padding: 10px 24px;
  font-size: 16px;
  background: #8f7a66;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.overlay button:hover {
  background: #776e65;
}
</style>
</head>
<body>
<div class="header">
  <h1>2048</h1>
  <div class="score-box">
    <div class="label">Score</div>
    <div class="value" id="score">0</div>
  </div>
</div>
<div class="controls">
  <button id="new-game-btn">New Game</button>
</div>
<div class="board" id="board">
  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  <div class="overlay" id="game-over">
    <h2>Game Over!</h2>
    <button id="retry-btn">Try Again</button>
  </div>
</div>

<script>
(function() {
  var SIZE = 4;
  var grid = [];
  var score = 0;

  var scoreEl = document.getElementById("score");
  var boardEl = document.getElementById("board");
  var overlayEl = document.getElementById("game-over");
  var cells = boardEl.querySelectorAll(".cell");

  function init() {
    grid = [];
    score = 0;
    scoreEl.textContent = "0";
    overlayEl.classList.remove("active");
    for (var r = 0; r < SIZE; r++) {
      grid[r] = [0, 0, 0, 0];
    }
    spawnTile();
    spawnTile();
    render();
  }

  function emptyCells() {
    var empty = [];
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) empty.push({ r: r, c: c });
      }
    }
    return empty;
  }

  function spawnTile() {
    var empty = emptyCells();
    if (empty.length === 0) return;
    var pos = empty[Math.floor(Math.random() * empty.length)];
    grid[pos.r][pos.c] = Math.random() < 0.9 ? 2 : 4;
  }

  function render() {
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        var cell = cells[r * SIZE + c];
        var val = grid[r][c];
        if (val === 0) {
          cell.innerHTML = "";
        } else {
          cell.innerHTML = '<div class="tile" data-value="' + val + '">' + val + '</div>';
        }
      }
    }
  }

  function slideRow(row) {
    var moved = false;
    var filtered = row.filter(function(v) { return v !== 0; });
    var result = [];
    for (var i = 0; i < filtered.length; i++) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        var merged = filtered[i] * 2;
        result.push(merged);
        score += merged;
        i++;
        moved = true;
      } else {
        result.push(filtered[i]);
      }
    }
    while (result.length < SIZE) result.push(0);
    for (var j = 0; j < SIZE; j++) {
      if (result[j] !== row[j]) moved = true;
    }
    return { row: result, moved: moved };
  }

  function move(direction) {
    var moved = false;
    if (direction === "left") {
      for (var r = 0; r < SIZE; r++) {
        var res = slideRow(grid[r]);
        if (res.moved) moved = true;
        grid[r] = res.row;
      }
    } else if (direction === "right") {
      for (var r = 0; r < SIZE; r++) {
        var rev = grid[r].slice().reverse();
        var res = slideRow(rev);
        if (res.moved) moved = true;
        grid[r] = res.row.reverse();
      }
    } else if (direction === "up") {
      for (var c = 0; c < SIZE; c++) {
        var col = [];
        for (var r = 0; r < SIZE; r++) col.push(grid[r][c]);
        var res = slideRow(col);
        if (res.moved) moved = true;
        for (var r = 0; r < SIZE; r++) grid[r][c] = res.row[r];
      }
    } else if (direction === "down") {
      for (var c = 0; c < SIZE; c++) {
        var col = [];
        for (var r = 0; r < SIZE; r++) col.push(grid[r][c]);
        col.reverse();
        var res = slideRow(col);
        if (res.moved) moved = true;
        res.row.reverse();
        for (var r = 0; r < SIZE; r++) grid[r][c] = res.row[r];
      }
    }

    if (moved) {
      spawnTile();
      scoreEl.textContent = score;
      render();
      if (isGameOver()) {
        overlayEl.classList.add("active");
      }
    }
  }

  function isGameOver() {
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (grid[r][c] === 0) return false;
        if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return false;
        if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return false;
      }
    }
    return true;
  }

  document.addEventListener("keydown", function(e) {
    var map = {
      ArrowLeft: "left",
      ArrowRight: "right",
      ArrowUp: "up",
      ArrowDown: "down"
    };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  document.getElementById("new-game-btn").addEventListener("click", init);
  document.getElementById("retry-btn").addEventListener("click", init);

  init();
})();
</script>
</body>
</html>
