<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#4F46E5">
<title>品牌名称 - 产品宣传页</title>
<style>
/* ========================================
   [REPLACE] 品牌主题色在 CSS 变量中集中定义
   ======================================== */
:root {
  --color-primary: #4F46E5;
  --color-primary-dark: #4338CA;
  --color-primary-light: #818CF8;
  --color-secondary: #0EA5E9;
  --color-accent: #F59E0B;
  --color-bg: #F8FAFC;
  --color-surface: #FFFFFF;
  --color-text: #1E293B;
  --color-text-secondary: #64748B;
  --color-text-light: #FFFFFF;
  --font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-family);
  color: var(--color-text);
  background: var(--color-bg);
  line-height: 1.6;
  overflow-x: hidden;
}

img { max-width: 100%; height: auto; display: block; }
a { text-decoration: none; color: inherit; }
button { font-family: inherit; cursor: pointer; border: none; }

.container {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== Hero / Brand Visual Section ===== */
.hero {
  position: relative;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
  padding: 60px 20px 48px;
  text-align: center;
  color: var(--color-text-light);
  overflow: hidden;
}

.hero::before {
  content: "";
  position: absolute;
  top: -40%;
  right: -30%;
  width: 300px;
  height: 300px;
  background: rgba(255,255,255,0.08);
  border-radius: 50%;
}

.hero::after {
  content: "";
  position: absolute;
  bottom: -20%;
  left: -20%;
  width: 200px;
  height: 200px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}

.hero-content {
  position: relative;
  z-index: 1;
}

.brand-logo {
  width: 72px;
  height: 72px;
  margin: 0 auto 20px;
  background: rgba(255,255,255,0.2);
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: 800;
  color: #fff;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.hero h1 {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.3;
  margin-bottom: 12px;
  letter-spacing: -0.02em;
}

.hero .tagline {
  font-size: 16px;
  opacity: 0.9;
  line-height: 1.5;
  margin-bottom: 28px;
  max-width: 340px;
  margin-left: auto;
  margin-right: auto;
}

.hero-cta {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--color-text-light);
  color: var(--color-primary);
  font-size: 17px;
  font-weight: 700;
  padding: 14px 36px;
  border-radius: 50px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  transition: transform 0.2s, box-shadow 0.2s;
}

.hero-cta:active {
  transform: scale(0.97);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

.hero-cta svg {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
}

.hero-wave {
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 100%;
  line-height: 0;
}

.hero-wave svg {
  width: 100%;
  height: 40px;
}

/* ===== Features Section ===== */
.features {
  padding: 48px 0 40px;
}

.section-header {
  text-align: center;
  margin-bottom: 32px;
  padding: 0 20px;
}

.section-header h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 8px;
}

.section-header p {
  font-size: 14px;
  color: var(--color-text-secondary);
}

.feature-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
  padding: 0 20px;
}

.feature-card {
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 16px;
  transition: transform 0.2s;
}

.feature-card:active {
  transform: scale(0.98);
}

.feature-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.feature-icon.icon-1 { background: #EEF2FF; }
.feature-icon.icon-2 { background: #ECFDF5; }
.feature-icon.icon-3 { background: #FFF7ED; }
.feature-icon.icon-4 { background: #FDF2F8; }

.feature-text h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 4px;
  color: var(--color-text);
}

.feature-text p {
  font-size: 14px;
  color: var(--color-text-secondary);
  line-height: 1.5;
}

/* ===== Social Proof / Stats ===== */
.stats {
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
  padding: 40px 20px;
  color: var(--color-text-light);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  text-align: center;
  max-width: 480px;
  margin: 0 auto;
}

.stat-item .stat-number {
  font-size: 28px;
  font-weight: 800;
  display: block;
  line-height: 1.2;
}

.stat-item .stat-label {
  font-size: 12px;
  opacity: 0.8;
  margin-top: 4px;
}

/* ===== CTA / Lead Form Section ===== */
.cta-section {
  padding: 48px 20px 60px;
}

.cta-card {
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: 32px 24px;
  box-shadow: var(--shadow-lg);
  text-align: center;
  max-width: 480px;
  margin: 0 auto;
}

.cta-card h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 8px;
}

.cta-card .cta-desc {
  font-size: 14px;
  color: var(--color-text-secondary);
  margin-bottom: 24px;
}

.form-group {
  margin-bottom: 14px;
}

.form-group input {
  width: 100%;
  padding: 14px 16px;
  font-size: 15px;
  font-family: inherit;
  border: 1.5px solid #E2E8F0;
  border-radius: 10px;
  background: #F8FAFC;
  color: var(--color-text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

.form-group input::placeholder {
  color: #94A3B8;
}

.form-group input:focus {
  border-color: var(--color-primary-light);
  box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
  background: #fff;
}

.submit-btn {
  width: 100%;
  padding: 15px;
  font-size: 17px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
  color: #fff;
  border-radius: 10px;
  margin-top: 6px;
  transition: opacity 0.2s, transform 0.2s;
}

.submit-btn:active {
  opacity: 0.9;
  transform: scale(0.98);
}

.submit-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.form-note {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-top: 12px;
}

.form-success {
  display: none;
  padding: 24px 0;
}

.form-success .check-icon {
  width: 56px;
  height: 56px;
  background: #ECFDF5;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
}

.form-success .check-icon svg {
  width: 28px;
  height: 28px;
  color: #10B981;
}

.form-success h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 8px;
}

.form-success p {
  font-size: 14px;
  color: var(--color-text-secondary);
}

/* ===== Footer ===== */
.footer {
  background: #1E293B;
  color: rgba(255,255,255,0.6);
  padding: 28px 20px;
  text-align: center;
  font-size: 13px;
  line-height: 1.8;
}

.footer a {
  color: rgba(255,255,255,0.8);
}

/* ===== Floating Download Button ===== */
.floating-cta {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 20px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
  z-index: 100;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}

.floating-cta.visible {
  transform: translateY(0);
}

.floating-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 14px;
  font-size: 17px;
  font-weight: 700;
  color: #fff;
  background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
  border-radius: 12px;
  transition: opacity 0.2s, transform 0.2s;
}

.floating-btn:active {
  opacity: 0.9;
  transform: scale(0.98);
}

.floating-btn svg {
  width: 20px;
  height: 20px;
}

/* ===== Utility ===== */
@media (min-width: 480px) {
  .hero h1 { font-size: 32px; }
  .hero { padding: 72px 24px 56px; }
  .stat-item .stat-number { font-size: 32px; }
  .section-header h2 { font-size: 24px; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>

<!-- ===== Hero / Brand Visual ===== -->
<section class="hero" id="hero">
  <div class="hero-content">
    <!-- [REPLACE] brand-logo: 替换为品牌 Logo 图片或文字 -->
    <div class="brand-logo" id="brand-logo"></div>
    <!-- [REPLACE] hero-title: 替换为正式品牌标题 -->
    <h1 id="hero-title"></h1>
    <!-- [REPLACE] hero-tagline: 替换为正式宣传语 -->
    <p class="tagline" id="hero-tagline"></p>
    <!-- [REPLACE] hero-cta-link: 替换为正式下载/注册链接 -->
    <a class="hero-cta" id="hero-cta" href="#cta-form">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="hero-cta-text"></span>
    </a>
  </div>
  <div class="hero-wave">
    <svg viewBox="0 0 1440 40" preserveAspectRatio="none"><path fill="var(--color-bg)" d="M0,24 C360,48 720,0 1080,24 C1260,36 1380,28 1440,24 L1440,40 L0,40 Z"/></svg>
  </div>
</section>

<!-- ===== Product Features ===== -->
<section class="features" id="features">
  <div class="section-header">
    <!-- [REPLACE] features-title / features-subtitle -->
    <h2 id="features-title"></h2>
    <p id="features-subtitle"></p>
  </div>
  <div class="feature-list" id="feature-list">
    <!-- Feature cards rendered by JS from config -->
  </div>
</section>

<!-- ===== Social Proof Stats ===== -->
<section class="stats" id="stats">
  <div class="stats-grid" id="stats-grid">
    <!-- Stats rendered by JS from config -->
  </div>
</section>

<!-- ===== CTA / Lead Form ===== -->
<section class="cta-section" id="cta-form">
  <div class="cta-card">
    <!-- [REPLACE] cta-title / cta-desc -->
    <h2 id="cta-title"></h2>
    <p class="cta-desc" id="cta-desc"></p>

    <form id="lead-form" novalidate>
      <div class="form-group">
        <!-- [REPLACE] form-name-placeholder -->
        <input type="text" id="input-name" required autocomplete="name">
      </div>
      <div class="form-group">
        <!-- [REPLACE] form-phone-placeholder -->
        <input type="tel" id="input-phone" required autocomplete="tel"
               pattern="^1[3-9]\d{9}$" inputmode="numeric" maxlength="11">
      </div>
      <div class="form-group">
        <!-- [REPLACE] form-email-placeholder -->
        <input type="email" id="input-email" autocomplete="email">
      </div>
      <!-- [REPLACE] submit-btn-text -->
      <button type="submit" class="submit-btn" id="submit-btn"></button>
      <!-- [REPLACE] form-disclaimer -->
      <p class="form-note" id="form-note"></p>
    </form>

    <div class="form-success" id="form-success">
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <!-- [REPLACE] success-title / success-message -->
      <h3 id="success-title"></h3>
      <p id="success-message"></p>
    </div>
  </div>
</section>

<!-- ===== Footer ===== -->
<footer class="footer">
  <!-- [REPLACE] footer-text: 替换为正式版权及备案信息 -->
  <div id="footer-text"></div>
</footer>

<!-- ===== Floating CTA Button ===== -->
<div class="floating-cta" id="floating-cta">
  <!-- [REPLACE] floating-cta-link: 替换为正式下载链接 -->
  <a class="floating-btn" id="floating-btn" href="#cta-form">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span id="floating-btn-text"></span>
  </a>
</div>

<script>
(function () {
  "use strict";

  /* ================================================================
   * [REPLACE] SITE_CONFIG — 集中管理所有可替换的占位内容
   *
   * 部署前请将以下占位文案替换为正式品牌素材。
   * 每个字段旁标注了用途，修改此对象即可更新全站内容。
   * ================================================================ */
  var SITE_CONFIG = {
    /* --- 品牌信息 --- */
    brandName:   "BrandX",                        // [REPLACE] 品牌名称
    brandLogo:   "BX",                            // [REPLACE] Logo 文字（或改为 <img> 标签）
    pageTitle:   "BrandX - 让效率触手可及",        // [REPLACE] 页面 <title>

    /* --- Hero 区域 --- */
    heroTitle:   "重新定义你的\n工作方式",           // [REPLACE] 主标题
    heroTagline: "一站式智能协作平台，助力团队提升 10 倍效率，让每一次沟通都有价值。", // [REPLACE] 副标题
    heroCtaText: "立即体验",                       // [REPLACE] 主 CTA 按钮文案
    heroCtaLink: "#cta-form",                     // [REPLACE] 主 CTA 链接（下载链接或注册页）

    /* --- 功能亮点 --- */
    featuresTitle:    "核心功能亮点",               // [REPLACE] 功能区标题
    featuresSubtitle: "为现代团队打造的高效工具集",   // [REPLACE] 功能区副标题
    features: [                                   // [REPLACE] 每项功能的 icon / title / desc
      {
        icon:  "⚡",
        title: "智能任务管理",
        desc:  "AI 驱动的任务分配与优先级排序，自动识别关键路径，确保项目按时交付。"
      },
      {
        icon:  "🔒",
        title: "安全数据协作",
        desc:  "端到端加密传输，企业级权限管控，数据安全合规无忧。"
      },
      {
        icon:  "📊",
        title: "实时数据洞察",
        desc:  "可视化仪表盘一目了然，关键指标实时追踪，数据驱动决策。"
      },
      {
        icon:  "🌐",
        title: "全平台无缝同步",
        desc:  "iOS、Android、Web 三端实时同步，随时随地保持高效协作。"
      }
    ],

    /* --- 数据统计 --- */
    stats: [                                      // [REPLACE] 统计数字与标签
      { number: "100万+", label: "活跃用户" },
      { number: "99.9%",  label: "服务可用性" },
      { number: "50+",    label: "企业客户" }
    ],

    /* --- CTA 留资表单 --- */
    ctaTitle:          "立即开始免费试用",             // [REPLACE] 表单标题
    ctaDesc:           "留下您的信息，我们将在 24 小时内与您联系", // [REPLACE] 表单描述
    formNamePlaceholder:  "请输入您的姓名",           // [REPLACE]
    formPhonePlaceholder: "请输入手机号码",            // [REPLACE]
    formEmailPlaceholder: "请输入邮箱（选填）",        // [REPLACE]
    submitBtnText:     "提交并获取免费试用",           // [REPLACE] 提交按钮文案
    formDisclaimer:    "提交即表示同意我们的《隐私政策》与《服务条款》", // [REPLACE]

    /* --- 表单提交成功 --- */
    successTitle:   "提交成功！",                    // [REPLACE]
    successMessage: "感谢您的关注，我们的团队将尽快与您联系。", // [REPLACE]

    /* --- 底部浮动 CTA --- */
    floatingCtaText: "免费下载体验",                  // [REPLACE] 浮动按钮文案
    floatingCtaLink: "#cta-form",                   // [REPLACE] 浮动按钮链接

    /* --- 页脚 --- */
    footerText: "&copy; 2026 BrandX Inc. 保留所有权利。<br>京ICP备XXXXXXXX号-1", // [REPLACE] 版权与备案

    /* --- 表单提交端点 --- */
    formAction: ""  // [REPLACE] 后端接口地址或第三方表单服务 URL；留空时数据仅在前端展示成功
  };
  /* ================================================================ */

  document.title = SITE_CONFIG.pageTitle;

  function setText(id, text) {
    var el = document.getElementById(id);
    if (el) el.textContent = text;
  }

  function setHTML(id, html) {
    var el = document.getElementById(id);
    if (el) el.innerHTML = html;
  }

  /* --- 渲染 Hero --- */
  setText("brand-logo", SITE_CONFIG.brandLogo);
  setText("hero-title", SITE_CONFIG.heroTitle);
  setText("hero-tagline", SITE_CONFIG.heroTagline);
  setText("hero-cta-text", SITE_CONFIG.heroCtaText);
  var heroCta = document.getElementById("hero-cta");
  if (heroCta) heroCta.href = SITE_CONFIG.heroCtaLink;

  /* --- 渲染 Features --- */
  setText("features-title", SITE_CONFIG.featuresTitle);
  setText("features-subtitle", SITE_CONFIG.featuresSubtitle);

  var featureListEl = document.getElementById("feature-list");
  SITE_CONFIG.features.forEach(function (f, i) {
    var card = document.createElement("div");
    card.className = "feature-card";
    card.innerHTML =
      '<div class="feature-icon icon-' + ((i % 4) + 1) + '">' + escapeHTML(f.icon) + "</div>" +
      '<div class="feature-text"><h3>' + escapeHTML(f.title) + "</h3><p>" + escapeHTML(f.desc) + "</p></div>";
    featureListEl.appendChild(card);
  });

  /* --- 渲染 Stats --- */
  var statsGridEl = document.getElementById("stats-grid");
  SITE_CONFIG.stats.forEach(function (s) {
    var item = document.createElement("div");
    item.className = "stat-item";
    item.innerHTML =
      '<span class="stat-number">' + escapeHTML(s.number) + "</span>" +
      '<span class="stat-label">' + escapeHTML(s.label) + "</span>";
    statsGridEl.appendChild(item);
  });

  /* --- 渲染 CTA 表单 --- */
  setText("cta-title", SITE_CONFIG.ctaTitle);
  setText("cta-desc", SITE_CONFIG.ctaDesc);
  document.getElementById("input-name").placeholder = SITE_CONFIG.formNamePlaceholder;
  document.getElementById("input-phone").placeholder = SITE_CONFIG.formPhonePlaceholder;
  document.getElementById("input-email").placeholder = SITE_CONFIG.formEmailPlaceholder;
  setText("submit-btn", SITE_CONFIG.submitBtnText);
  setText("form-note", SITE_CONFIG.formDisclaimer);
  setText("success-title", SITE_CONFIG.successTitle);
  setText("success-message", SITE_CONFIG.successMessage);

  /* --- 渲染 Footer --- */
  setHTML("footer-text", SITE_CONFIG.footerText);

  /* --- 渲染 Floating CTA --- */
  setText("floating-btn-text", SITE_CONFIG.floatingCtaText);
  var floatingBtn = document.getElementById("floating-btn");
  if (floatingBtn) floatingBtn.href = SITE_CONFIG.floatingCtaLink;

  /* --- Floating CTA 显隐逻辑 --- */
  var floatingEl = document.getElementById("floating-cta");
  var heroSection = document.getElementById("hero");
  var lastScrollY = 0;

  function onScroll() {
    var scrollY = window.pageYOffset || document.documentElement.scrollTop;
    var heroBottom = heroSection.getBoundingClientRect().bottom;
    if (heroBottom < 0 && scrollY > lastScrollY) {
      floatingEl.classList.add("visible");
    } else if (heroBottom >= 0) {
      floatingEl.classList.remove("visible");
    }
    lastScrollY = scrollY;
  }

  window.addEventListener("scroll", onScroll, { passive: true });

  /* --- 表单验证与提交 --- */
  var form = document.getElementById("lead-form");
  var submitBtn = document.getElementById("submit-btn");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    var name = document.getElementById("input-name").value.trim();
    var phone = document.getElementById("input-phone").value.trim();
    var email = document.getElementById("input-email").value.trim();

    if (!name) {
      showFieldError("input-name");
      return;
    }
    if (!/^1[3-9]\d{9}$/.test(phone)) {
      showFieldError("input-phone");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "提交中…";

    var payload = { name: name, phone: phone, email: email };

    if (SITE_CONFIG.formAction) {
      /* [REPLACE] 正式环境请确认接口地址与请求格式 */
      var xhr = new XMLHttpRequest();
      xhr.open("POST", SITE_CONFIG.formAction, true);
      xhr.setRequestHeader("Content-Type", "application/json");
      xhr.onload = function () {
        if (xhr.status >= 200 && xhr.status < 300) {
          showSuccess();
        } else {
          submitBtn.disabled = false;
          submitBtn.textContent = SITE_CONFIG.submitBtnText;
        }
      };
      xhr.onerror = function () {
        submitBtn.disabled = false;
        submitBtn.textContent = SITE_CONFIG.submitBtnText;
      };
      xhr.send(JSON.stringify(payload));
    } else {
      setTimeout(function () { showSuccess(); }, 600);
    }
  });

  function showFieldError(id) {
    var el = document.getElementById(id);
    el.style.borderColor = "#EF4444";
    el.focus();
    el.addEventListener("input", function handler() {
      el.style.borderColor = "";
      el.removeEventListener("input", handler);
    });
  }

  function showSuccess() {
    form.style.display = "none";
    var successEl = document.getElementById("form-success");
    successEl.style.display = "block";
    floatingEl.classList.remove("visible");
  }

  function escapeHTML(str) {
    var div = document.createElement("div");
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }
})();
</script>
</body>
</html>
