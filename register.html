<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>报名登记</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
    "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.form-card {
  background: #fff;
  border-radius: 16px;
  padding: 40px 24px 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
}

.form-title {
  font-size: 24px;
  font-weight: 700;
  color: #1a1a2e;
  text-align: center;
  margin-bottom: 8px;
}

.form-subtitle {
  font-size: 14px;
  color: #6b7280;
  text-align: center;
  margin-bottom: 32px;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  color: #374151;
  margin-bottom: 8px;
}

.form-label .required {
  color: #ef4444;
  margin-left: 2px;
}

.form-input {
  width: 100%;
  height: 48px;
  padding: 0 16px;
  font-size: 16px;
  color: #1f2937;
  background: #f9fafb;
  border: 1.5px solid #d1d5db;
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}

.form-input::placeholder {
  color: #9ca3af;
}

.form-input:focus {
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
  background: #fff;
}

.form-input.error {
  border-color: #ef4444;
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
}

.error-message {
  font-size: 12px;
  color: #ef4444;
  margin-top: 6px;
  min-height: 18px;
  line-height: 18px;
}

.submit-btn {
  width: 100%;
  height: 48px;
  margin-top: 12px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  -webkit-appearance: none;
  appearance: none;
}

.submit-btn:active:not(:disabled) {
  transform: scale(0.98);
}

.submit-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.submit-btn.submitting {
  pointer-events: none;
  opacity: 0.7;
}

.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  pointer-events: none;
}

.toast.visible {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

@media (max-width: 360px) {
  .form-card {
    padding: 32px 16px 24px;
  }

  .form-title {
    font-size: 20px;
  }
}
</style>
</head>
<body>

<div class="form-card">
  <h1 class="form-title">报名登记</h1>
  <p class="form-subtitle">请填写以下信息完成报名</p>

  <form id="register-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="name">
        姓名<span class="required">*</span>
      </label>
      <input
        class="form-input"
        id="name"
        type="text"
        placeholder="请输入您的姓名"
        maxlength="50"
        autocomplete="name"
      >
      <div class="error-message" id="name-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="phone">
        手机号<span class="required">*</span>
      </label>
      <input
        class="form-input"
        id="phone"
        type="tel"
        placeholder="请输入11位手机号"
        maxlength="11"
        autocomplete="tel"
        inputmode="numeric"
      >
      <div class="error-message" id="phone-error"></div>
    </div>

    <button class="submit-btn" id="submit-btn" type="submit" disabled>提交报名</button>
  </form>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  var nameInput = document.getElementById("name");
  var phoneInput = document.getElementById("phone");
  var nameError = document.getElementById("name-error");
  var phoneError = document.getElementById("phone-error");
  var submitBtn = document.getElementById("submit-btn");
  var form = document.getElementById("register-form");
  var toastEl = document.getElementById("toast");
  var toastTimer = null;

  var PHONE_RE = /^1[3-9]\d{9}$/;

  function validateName(showError) {
    var val = nameInput.value.trim();
    if (!val) {
      if (showError) {
        nameError.textContent = "请输入姓名";
        nameInput.classList.add("error");
      }
      return false;
    }
    nameError.textContent = "";
    nameInput.classList.remove("error");
    return true;
  }

  function validatePhone(showError) {
    var val = phoneInput.value.trim();
    if (!val) {
      if (showError) {
        phoneError.textContent = "请输入手机号";
        phoneInput.classList.add("error");
      }
      return false;
    }
    if (!PHONE_RE.test(val)) {
      if (showError) {
        phoneError.textContent = "请输入正确的11位手机号";
        phoneInput.classList.add("error");
      }
      return false;
    }
    phoneError.textContent = "";
    phoneInput.classList.remove("error");
    return true;
  }

  function updateSubmitState() {
    var nameValid = nameInput.value.trim().length > 0;
    var phoneValid = PHONE_RE.test(phoneInput.value.trim());
    submitBtn.disabled = !(nameValid && phoneValid);
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add("visible");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () {
      toastEl.classList.remove("visible");
    }, 2000);
  }

  nameInput.addEventListener("input", function () {
    if (nameInput.classList.contains("error")) {
      validateName(true);
    }
    updateSubmitState();
  });

  nameInput.addEventListener("blur", function () {
    if (nameInput.value.trim()) {
      validateName(true);
    }
  });

  phoneInput.addEventListener("input", function () {
    phoneInput.value = phoneInput.value.replace(/\D/g, "");
    if (phoneInput.classList.contains("error")) {
      validatePhone(true);
    }
    updateSubmitState();
  });

  phoneInput.addEventListener("blur", function () {
    if (phoneInput.value.trim()) {
      validatePhone(true);
    }
  });

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    var nameOk = validateName(true);
    var phoneOk = validatePhone(true);

    if (!nameOk || !phoneOk) {
      if (!nameOk) nameInput.focus();
      else phoneInput.focus();
      return;
    }

    submitBtn.classList.add("submitting");
    submitBtn.textContent = "提交中...";

    setTimeout(function () {
      showToast("报名成功！");
      submitBtn.classList.remove("submitting");
      submitBtn.textContent = "提交报名";
      form.reset();
      submitBtn.disabled = true;
    }, 800);
  });
})();
</script>
</body>
</html>
